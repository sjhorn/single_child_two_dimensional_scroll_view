name: Feature Request
description: Propose a new feature or enhancement
labels: ["ready"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should this feature accomplish?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know this is done?
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: What this does NOT cover
