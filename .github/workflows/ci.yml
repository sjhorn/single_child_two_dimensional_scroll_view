name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - run: flutter pub get

      - name: CI gate (analyze + format + test + coverage + dartdoc)
        run: scripts/ci/ci_gate.sh

  pana:
    name: Pana Score
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Run pana analysis
        run: scripts/ci/pana.sh --verbose
